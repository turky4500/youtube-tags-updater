name: Update YouTube Tags Daily

on:
  schedule:
    - cron: '0 0 * * *'  # كل يوم منتصف الليل UTC
  workflow_dispatch:

permissions:
  contents: write   # ضروري للدفع للمستودع

jobs:
  update-tags:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # للدفع لاحقاً

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: تشغيل سكربت التحديث
        env:
          CLIENT_SECRET_JSON_B64: ${{ secrets.CLIENT_SECRET_JSON_B64 }}
          TOKEN_PICKLE_B64: ${{ secrets.TOKEN_PICKLE_B64 }}
        run: python update_tags.py

      - name: حفظ سجل التحديث في المستودع
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update_log.json
          # لا تفشل إن لم تكن هناك تغييرات
          git diff --staged --quiet || git commit -m "تحديث سجل آخر تعديل للفيديوهات"
          git push
