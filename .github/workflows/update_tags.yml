name: Update YouTube Tags Daily

on:
  schedule:
    - cron: '0 0 * * *'  # كل يوم منتصف الليل UTC
  workflow_dispatch:

jobs:
  update-tags:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client trendsmcp

      - name: فحص محتويات مكتبة trendsmcp
        run: python -c "import trendsmcp; print('\n=== محتويات trendsmcp ==='); print(dir(trendsmcp)); print('\n=== محاولة استيراد Client ==='); from trendsmcp import Client; print('نجح استيراد Client'); print(dir(Client))"

      - name: تشغيل سكربت التحديث
        env:
          CLIENT_SECRET_JSON_B64: ${{ secrets.CLIENT_SECRET_JSON_B64 }}
          TOKEN_PICKLE_B64: ${{ secrets.TOKEN_PICKLE_B64 }}
          TRENDSMCP_API_KEY: ${{ secrets.TRENDSMCP_API_KEY }}
        run: python update_tags.py
